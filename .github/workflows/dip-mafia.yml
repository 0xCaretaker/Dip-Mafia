name: Dip Mafia Signal Bot

on:
  schedule:
    # GitHub runs `schedule` best-effort — runs are often delayed (commonly 1–2h)
    # or dropped under load, so these times are targets, not guarantees. Four
    # weekday runs ~2h apart (08:33–14:33 IST) keep alerts flowing through the
    # trading day. bot.py no longer gates on market hours, so a delayed run still
    # delivers; spreading 4 runs (vs. a single pair) means a dropped trigger
    # still leaves same-day coverage. The dedup hash suppresses a duplicate
    # message when signals are unchanged between runs.
    # Minute :03 (not :00/:30) dodges the top-of-hour scheduling stampede.
    - cron: '3 3,5,7,9 * * 1-5'  # Target: 08:33/10:33/12:33/14:33 IST, weekdays
    - cron: '3 5 * * 0,6'        # Target: 10:33 IST weekend summary
  workflow_dispatch:
    inputs:
      force:
        description: "Post signals even if unchanged since the last run"
        type: boolean
        default: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore signal cache
        uses: actions/cache/restore@v4
        with:
          path: .last_signal_hash
          key: signal-hash-${{ github.run_id }}
          restore-keys: signal-hash-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MACD + Impulse + Bollinger script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          # Manual dispatch defaults force=true; scheduled runs leave it empty
          # so the dedup hash still suppresses unchanged signals.
          DIP_MAFIA_FORCE: ${{ inputs.force }}
        run: python bot.py

      - name: Save signal cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .last_signal_hash
          key: signal-hash-${{ github.run_id }}
