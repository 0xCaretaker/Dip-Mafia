name: Dip Mafia Signal Bot

on:
  schedule:
    # GitHub runs `schedule` best-effort — runs are often delayed (commonly 1–2h)
    # or dropped under load, so these times are targets, not guarantees. Four
    # weekday runs ~2h apart (08:33–14:33 IST) keep alerts flowing through the
    # trading day. bot.py no longer gates on market hours, so a delayed run still
    # delivers. Every run posts the full message (the dedup hash was removed),
    # so spreading 4 runs also means a dropped trigger still leaves coverage.
    # Minute :03 (not :00/:30) dodges the top-of-hour scheduling stampede.
    - cron: '3 3,5,7,9 * * 1-5'  # Target: 08:33/10:33/12:33/14:33 IST, weekdays
    - cron: '3 5 * * 0,6'        # Target: 10:33 IST weekend summary
  workflow_dispatch:
    inputs:
      reuse_if_unchanged:
        description: >-
          Re-send the last cached message instead of recomputing when the
          watchlist and trading date are unchanged. Set true by the six7 scan
          dispatch; cron and the manual button leave it false (always recompute).
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore last-post cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: dip-mafia-lastpost-${{ github.run_id }}
          restore-keys: |
            dip-mafia-lastpost-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MACD + Impulse + Bollinger script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REUSE_IF_UNCHANGED: ${{ inputs.reuse_if_unchanged }}
        run: python bot.py
