name: HODL Signal Bot

on:
  schedule:
    # GitHub runs `schedule` best-effort — runs are often delayed (commonly 1–2h)
    # or dropped under load, so these times are targets, not guarantees. We
    # deliberately schedule EARLY (08:33–14:33 IST) so that even a delayed run
    # still lands inside bot.py's within_market_hours() window (09:15–16:00 IST);
    # a run that fires outside that window computes signals but skips the send.
    # Minute :03 (not :00/:30) dodges the top-of-hour scheduling stampede.
    - cron: '3 3-9 * * 1-5'  # Target: hourly 08:33–14:33 IST, weekdays
    - cron: '3 5 * * 0,6'    # Target: 10:33 IST weekend summary
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore signal cache
        uses: actions/cache/restore@v4
        with:
          path: .last_signal_hash
          key: signal-hash-${{ github.run_id }}
          restore-keys: signal-hash-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MACD + Impulse + Bollinger script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python bot.py

      - name: Save signal cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .last_signal_hash
          key: signal-hash-${{ github.run_id }}
