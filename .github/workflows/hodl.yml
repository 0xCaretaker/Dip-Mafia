name: HODL Signal Bot

on:
  schedule:
    # NOTE: GitHub runs `schedule` best-effort — runs are often delayed (hours) or
    # dropped under load, so these times are targets, not guarantees. The actual
    # "don't notify off-hours" guarantee lives in bot.py's within_market_hours()
    # guard (09:15–15:30 IST); a delayed run computes signals but skips the send.
    - cron: '45 3-9 * * 1-5'  # Target: hourly 09:15–15:15 IST, weekdays
    - cron: '45 4 * * 0,6'    # Target: 10:15 IST weekend summary
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore signal cache
        uses: actions/cache/restore@v4
        with:
          path: .last_signal_hash
          key: signal-hash-${{ github.run_id }}
          restore-keys: signal-hash-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MACD + Impulse + Bollinger script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python bot.py

      - name: Save signal cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .last_signal_hash
          key: signal-hash-${{ github.run_id }}
