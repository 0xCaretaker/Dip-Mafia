<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dip Mafia · strategy almanac</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<meta name="description" content="Dip Mafia: a long-only dip-buying signal strategy for NSE stocks. Portfolio, backtest, fundamental screens and watchlist iterations, every view scoped to 1Y / 3Y / 5Y / 10Y / All.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:oklch(0.165 0.012 250);
  --surface:oklch(0.205 0.014 250);
  --surface-2:oklch(0.250 0.016 250);
  --line:oklch(0.300 0.014 250);
  --line-2:oklch(0.380 0.014 250);
  --ink:oklch(0.965 0.004 250);
  --ink-dim:oklch(0.770 0.010 250);
  --ink-mute:oklch(0.620 0.012 250);
  --accent:oklch(0.800 0.130 75);
  --accent-2:oklch(0.700 0.120 70);
  --accent-soft:oklch(0.800 0.130 75 / 0.12);
  --up:oklch(0.760 0.150 155);
  --down:oklch(0.680 0.175 25);
  --sip:oklch(0.740 0.100 220);
  --bench:oklch(0.700 0.020 250);
  --r:12px; --r-sm:8px;
  --z-sticky:30; --z-tip:60; --z-modal:80;
  --sans:"Inter",system-ui,-apple-system,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
  --disp:"Fraunces",Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 480px at 88% -10%, oklch(0.800 0.130 75 / 0.06), transparent 60%);
  background-attachment:fixed; min-height:100vh;
}
.mono{font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.01em}
.num{font-family:var(--mono); font-variant-numeric:tabular-nums}
.up{color:var(--up)} .down{color:var(--down)}
.wrap{max-width:1240px; margin:0 auto; padding:0 24px}
a{color:inherit}
::selection{background:var(--accent-soft)}

/* ── top bar ── */
.topbar{position:sticky; top:0; z-index:var(--z-sticky);
  backdrop-filter:blur(12px);
  background:color-mix(in oklch, var(--bg) 82%, transparent);
  border-bottom:1px solid var(--line)}
.topbar .row{display:flex; align-items:center; gap:18px; height:60px}
.brand{display:flex; align-items:baseline; gap:9px; flex-shrink:0; text-decoration:none}
.brand .mark{font-family:var(--disp); font-weight:600; font-size:1.18rem; color:var(--ink); letter-spacing:-.01em}
.brand .mark b{color:var(--accent)}
.brand .tag{font-family:var(--mono); font-size:.62rem; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-mute); display:none}
@media(min-width:1040px){.brand .tag{display:inline}}

nav.sections{display:flex; gap:2px; margin-left:6px; min-width:0; overflow-x:auto; scrollbar-width:none}
nav.sections::-webkit-scrollbar{display:none}
nav.sections button{
  font-family:var(--sans); font-size:.86rem; font-weight:500; color:var(--ink-dim);
  background:none; border:none; padding:8px 13px; border-radius:var(--r-sm); cursor:pointer;
  white-space:nowrap; transition:color .15s, background .15s; position:relative}
nav.sections button:hover{color:var(--ink); background:var(--surface)}
nav.sections button[aria-current="true"]{color:var(--ink)}
nav.sections button[aria-current="true"]::after{
  content:""; position:absolute; left:13px; right:13px; bottom:-1px; height:2px;
  background:var(--accent); border-radius:2px}
.spacer{flex:1}

.seg{display:inline-flex; background:var(--surface); border:1px solid var(--line);
  border-radius:999px; padding:3px; gap:1px; flex-shrink:0}
.seg button{font-family:var(--mono); font-size:.74rem; font-weight:500; color:var(--ink-dim);
  background:none; border:none; padding:6px 11px; border-radius:999px; cursor:pointer;
  transition:.15s; white-space:nowrap}
.seg button:hover{color:var(--ink)}
.seg button[aria-pressed="true"]{background:var(--accent); color:oklch(0.20 0.03 75); font-weight:700}
.seg.sm button{padding:5px 9px; font-size:.7rem}
button:focus-visible, .seg button:focus-visible, nav.sections button:focus-visible,
.chip:focus-visible, th:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

.hz-label{font-family:var(--mono); font-size:.6rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--ink-mute); margin-right:9px; display:none}
@media(min-width:720px){.hz-label{display:inline}}

/* ── section scaffold ── */
main{padding:30px 0 90px}
.panel{display:none; animation:fade .28s ease-out}
.panel.active{display:block}
@keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
.sec-head{display:flex; align-items:flex-end; justify-content:space-between; gap:18px;
  flex-wrap:wrap; margin-bottom:22px}
.sec-head h1{font-family:var(--sans); font-weight:700; font-size:1.5rem; letter-spacing:-.02em}
.sec-head .lede{color:var(--ink-dim); font-size:.92rem; max-width:60ch; margin-top:5px}
.sec-head .asof{font-family:var(--mono); font-size:.68rem; color:var(--ink-mute); text-align:right; line-height:1.7}
.sec-head .asof b{color:var(--ink-dim); font-weight:500}

/* ── tiles ── */
.tiles{display:grid; grid-template-columns:repeat(auto-fit, minmax(min(100%,158px),1fr)); gap:12px}
.tile{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:15px 16px;
  display:flex; flex-direction:column}
.tile .k{font-family:var(--mono); font-size:.62rem; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink-mute); display:flex; gap:6px; align-items:center}
.tile .v{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:1.6rem; font-weight:600;
  margin-top:7px; line-height:1.02; letter-spacing:-.02em}
.tile .v small{font-size:.82rem; color:var(--ink-dim); font-weight:500; letter-spacing:0}
.tile .sub{font-family:var(--mono); font-size:.72rem; color:var(--ink-dim); margin-top:auto; padding-top:6px}
/* lead tile: the section's headline metric, raised and scaled up to break the uniform grid */
.tile.lead{grid-column:span 2; background:var(--surface-2); border-color:var(--line-2); padding:18px 20px}
.tile.lead .k{font-size:.66rem; color:var(--ink-dim)}
.tile.lead .v{font-size:2.7rem; font-weight:700; margin-top:10px; letter-spacing:-.035em}
.tile.lead .v small{font-size:1.1rem}
.tile.lead .sub{font-size:.78rem}
@media(max-width:620px){.tile.lead{grid-column:span 1}}

/* ── panels / charts ── */
.grid{display:grid; gap:16px}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:18px}
.card h3{font-size:.95rem; font-weight:600; letter-spacing:-.01em}
.card .csub{color:var(--ink-mute); font-size:.78rem; margin-top:3px}
.legend{display:flex; gap:16px; flex-wrap:wrap; margin:10px 0 4px;
  font-family:var(--mono); font-size:.72rem; color:var(--ink-dim)}
.legend span{display:inline-flex; align-items:center; gap:7px}
.legend i{width:14px; height:3px; border-radius:2px; display:inline-block}
.legend i.dash{height:0; border-top:2px dashed currentColor; width:16px}
.chart-host{position:relative; margin-top:8px}
svg.chart{width:100%; height:auto; display:block; overflow:visible; touch-action:none}
.axis text{font-family:var(--mono); font-size:10px; fill:var(--ink-mute)}
.gridline{stroke:var(--line); stroke-width:1}
.zeroline{stroke:var(--line-2); stroke-width:1}
.crosshair{stroke:var(--line-2); stroke-dasharray:3 3}
.tip{position:absolute; pointer-events:none; z-index:var(--z-tip);
  background:var(--surface-2); border:1px solid var(--line-2); border-radius:var(--r-sm);
  padding:9px 11px; font-family:var(--mono); font-size:.72rem; color:var(--ink);
  opacity:0; transition:opacity .12s; white-space:nowrap; box-shadow:0 8px 24px oklch(0 0 0 / .4)}
.tip .d{color:var(--ink-mute); margin-bottom:5px}
.tip .r{display:flex; justify-content:space-between; gap:16px}
.tip .r i{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align:middle}

/* ── table ── */
.table-wrap{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); overflow:auto}
table{width:100%; border-collapse:collapse; font-size:.82rem}
thead th{font-family:var(--mono); font-size:.64rem; letter-spacing:.08em; text-transform:uppercase;
  color:var(--ink-mute); font-weight:500; text-align:right; padding:11px 13px;
  border-bottom:1px solid var(--line-2); position:sticky; top:0; background:var(--surface);
  cursor:pointer; user-select:none; white-space:nowrap}
thead th:first-child{text-align:left}
thead th.sorted{color:var(--accent)}
tbody td{padding:9px 13px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap;
  font-family:var(--mono); font-variant-numeric:tabular-nums}
tbody td:first-child{text-align:left; font-family:var(--sans); font-weight:600; color:var(--ink)}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--surface-2)}
tr.total td{background:var(--surface-2); font-weight:700; border-top:1px solid var(--line-2)}
tr.best td{background:var(--accent-soft)}
tr.best td:first-child{box-shadow:inset 2px 0 0 var(--accent)}
tr.cur td:first-child{box-shadow:inset 2px 0 0 var(--up)}
.cell-best{color:var(--accent); font-weight:700}
.wbar{display:inline-flex; align-items:center; justify-content:flex-end; gap:6px}
.wbar i{height:5px; border-radius:3px; display:inline-block; min-width:3px}
.stocklink{cursor:pointer; border-bottom:1px dotted var(--ink-mute)}
.stocklink:hover{border-color:var(--accent); color:var(--accent)}

.controls{display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center}
.controls input{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-sm);
  color:var(--ink); padding:8px 12px; font-size:.82rem; font-family:var(--sans); width:200px}
.controls input::placeholder{color:var(--ink-mute)}
.controls input:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:transparent}

.chips{display:flex; flex-wrap:wrap; gap:7px}
.chip{font-family:var(--mono); font-size:.74rem; color:var(--ink-dim); cursor:pointer;
  padding:6px 12px; border:1px solid var(--line); border-radius:999px; background:var(--surface);
  transition:.15s; white-space:nowrap}
.chip:hover{color:var(--ink); border-color:var(--line-2)}
.chip[aria-pressed="true"]{background:var(--ink); color:var(--bg); border-color:var(--ink); font-weight:600}
.chip .ct{opacity:.5; margin-left:5px}

.tag{font-family:var(--mono); font-size:.56rem; letter-spacing:.06em; text-transform:uppercase;
  padding:2px 7px; border-radius:999px; border:1px solid var(--line-2); color:var(--ink-dim)}
.tag.crown{color:var(--accent); border-color:var(--accent-2)}
.tag.live{color:var(--up); border-color:oklch(0.760 0.150 155 / .4)}

.note-strip{display:flex; gap:12px; align-items:flex-start; padding:12px 16px; margin-bottom:18px;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  font-size:.84rem; color:var(--ink-dim); line-height:1.7}
.note-strip b{color:var(--ink); font-weight:600}
.note-strip .pin{color:var(--accent); font-family:var(--disp); font-size:1.1rem; line-height:1}

/* ── overview hero ── */
.hero{display:grid; grid-template-columns:1.15fr 1fr; gap:28px; align-items:center;
  padding:20px 0 30px; border-bottom:1px solid var(--line); margin-bottom:28px}
@media(max-width:860px){.hero{grid-template-columns:1fr}}
.hero .big{font-family:var(--disp); font-weight:600; font-size:clamp(3rem,8.5vw,5.4rem);
  line-height:.9; letter-spacing:-.035em; font-variant-numeric:tabular-nums}
.hero .big .cur{font-size:.46em; color:var(--ink-mute); font-weight:500; vertical-align:.32em; margin-right:.05em}
.hero .big .u{font-size:.4em; color:var(--ink-dim); font-weight:600; vertical-align:.34em; margin-left:.08em; letter-spacing:0}
.hero .pnl{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:1.42rem;
  font-weight:700; letter-spacing:-.01em; margin-top:14px; display:flex; align-items:baseline;
  flex-wrap:wrap; gap:0}
.hero .pnl .dot{margin:0 .55em; color:var(--ink-mute); font-weight:400}
.hero .pnl .ov{margin-left:.7em; font-size:.78rem; font-weight:500; color:var(--ink-mute);
  letter-spacing:.02em; text-transform:none}
.hero .meta{color:var(--ink-dim); font-size:.9rem; margin-top:16px; max-width:46ch; line-height:1.6}
.verdict{font-size:.95rem; color:var(--ink-dim); line-height:1.7; margin-top:6px}
.verdict b{color:var(--ink)}

footer{border-top:1px solid var(--line); padding:30px 0 50px; color:var(--ink-mute); font-size:.8rem}
footer .mono{font-size:.72rem; line-height:1.9}
footer a{color:var(--ink-dim); text-decoration:underline; text-underline-offset:3px}

/* ── modal ── */
.overlay{display:none; position:fixed; inset:0; z-index:var(--z-modal);
  background:oklch(0 0 0 / .72); padding:24px; align-items:center; justify-content:center}
.overlay.active{display:flex}
.modal{background:var(--surface); border:1px solid var(--line-2); border-radius:var(--r);
  padding:22px; max-width:560px; width:100%; max-height:82vh; overflow:auto}
.modal .x{float:right; cursor:pointer; color:var(--ink-mute); font-size:1.4rem; line-height:1; background:none; border:none}
.modal .x:hover{color:var(--ink)}
.modal h3{font-size:1.1rem; margin-bottom:4px}
.modal .msub{color:var(--ink-dim); font-size:.82rem; margin-bottom:14px; font-family:var(--mono)}

@media(max-width:560px){
  .wrap{padding:0 16px}
  .tiles{grid-template-columns:1fr}
  .sec-head .lede,.hero .meta{max-width:100%}
  .sec-head .asof{text-align:left}
  .tile .v{font-size:1.18rem; overflow-wrap:anywhere}
}
@media(prefers-reduced-motion:reduce){
  *,.panel{animation:none !important; transition:none !important}
  .draw{stroke-dashoffset:0 !important}
}
body{overflow-x:hidden}
@media(max-width:680px){
  .topbar .row{flex-wrap:wrap; height:auto; padding:9px 0; gap:8px 12px}
  .spacer{display:none}
  #hzSeg{margin-left:auto}
  nav.sections{order:5; width:100%; margin-left:0}
}
@media(max-width:760px){
  .hero{grid-template-columns:1fr}
  .grid[style]{grid-template-columns:1fr !important}
  .sec-head .asof{text-align:left}
}
.draw{stroke-dasharray:var(--len); stroke-dashoffset:var(--len); animation:draw 1.1s cubic-bezier(.33,.1,.2,1) forwards}
@keyframes draw{to{stroke-dashoffset:0}}
</style>
</head>
<body>

<header class="topbar"><div class="wrap row">
  <a class="brand" href="#overview">
    <span class="mark">Dip<b>Mafia</b></span>
    <span class="tag">almanac of hindsight</span>
  </a>
  <nav class="sections" id="nav" aria-label="Sections"></nav>
  <span class="spacer"></span>
  <span class="hz-label">Horizon</span>
  <span class="seg" id="hzSeg" role="group" aria-label="Time horizon"></span>
</div></header>

<main class="wrap">
  <section id="panel-overview"   class="panel" aria-label="Overview"></section>
  <section id="panel-portfolio"  class="panel" aria-label="Portfolio"></section>
  <section id="panel-backtest"   class="panel" aria-label="Backtest"></section>
  <section id="panel-screens"    class="panel" aria-label="Screens"></section>
  <section id="panel-iterations" class="panel" aria-label="Iterations"></section>
</main>

<footer><div class="wrap">
  <p>An almanac of hindsight, not advice. Signals only: the strategy buys dips and HODLs; it never sells.</p>
  <p class="mono" id="footmeta"></p>
</div></footer>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="mTitle">
  <div class="modal">
    <button class="x" aria-label="Close" onclick="closeModal()">&times;</button>
    <h3 id="mTitle"></h3>
    <div class="msub" id="mSub"></div>
    <div id="mBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="strat_data.js"></script>
<script>
"use strict";
const S = window.STRAT_DATA, SIX = window.SIX7_DATA;
const $ = (s,r=document)=>r.querySelector(s);
const elh = (h)=>{const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstChild;};

/* ── state ── */
const HORIZONS = (S && S.horizon_set) || ["1Y","3Y","5Y","10Y","All"];
const HZ_YEARS = {"1Y":1,"3Y":3,"5Y":5,"10Y":10,"All":null};
const SIX_MAP  = {"1Y":"1y","3Y":"3y","5Y":"5y","10Y":"10y","All":"full"};
const GRID_MAP = {"1Y":"1y","3Y":"3y","5Y":"5y","10Y":"10y","All":"Full"};
let HZ = "All", SEC = "overview";

/* active per-horizon portfolio book (fresh sim that started HZ ago) */
function PH(){
  const b=(S.portfolio&&S.portfolio.byHorizon)||{};
  return b[HZ]||b.All||{summary:{},rows:[],alloc:{labels:[],values:[]},
    pnl:{labels:[],values:[]},nav:{dates:[],value:[],invested:[]}};
}
const hzPhrase = ()=> HZ==="All" ? "all time" : "the last "+HZ;

/* chart mode: absolute rupee value (rises with deposits) vs unitized NAV index */
let NAVMODE = "value";
function setNavMode(m){ NAVMODE=m; RENDER[SEC](); }
const navToggle = ()=>`<span class="seg sm navseg" role="group" aria-label="Chart mode">`+
  `<button data-m="value" aria-pressed="${NAVMODE==='value'}" onclick="setNavMode('value')">Value</button>`+
  `<button data-m="nav" aria-pressed="${NAVMODE==='nav'}" onclick="setNavMode('nav')">NAV</button></span>`;
const navSub = ()=> NAVMODE==="nav"
  ? "Unitized NAV (base 100) · deposits buy units, so only performance moves the line"
  : (HZ==="All"?"Full-history book":"Fresh sim started "+HZ+" ago")+" · daily value (rises with deposits + gains)";
function navChart(host, nav, h){
  if(NAVMODE==="nav"){
    const ni=nav.navindex||nav.value;
    lineChart(host,[{name:"NAV (base 100)",color:cvar("--accent"),d:nav.dates,v:ni,width:2.4,fill:true}],
      {h,zeroAt:100,yfmt:v=>fmtNum(v,0),tipFmt:v=>v==null?"–":fmtNum(v,1)+" ("+fmtPct((v/100-1)*100,0)+")",draw:true,padL:54});
  } else {
    lineChart(host,[
      {name:"Market value",color:cvar("--accent"),d:nav.dates,v:nav.value,width:2.4,fill:true},
      {name:"Invested",color:cvar("--ink-mute"),d:nav.dates,v:nav.invested,width:1.3,dash:"4 4"},
    ],{h,ymin:0,yfmt:v=>fmtCr(v),tipFmt:v=>fmtCr(v),draw:true,padL:54});
  }
}

const SECTIONS = [
  ["overview","Overview"], ["portfolio","Portfolio"], ["backtest","Backtest"],
  ["screens","Screens"], ["iterations","Iterations"],
];

/* ── format ── */
const fmtCr = v => v==null||isNaN(v) ? "–" : (Math.abs(v)>=1e7 ? "₹"+(v/1e7).toFixed(2)+"Cr" : Math.abs(v)>=1e5 ? "₹"+(v/1e5).toFixed(2)+"L" : "₹"+Math.round(v).toLocaleString("en-IN"));
/* hero figure: rupee sign + Cr/L unit rendered as muted affixes, digits dominant */
function fmtHero(v){
  if(v==null||isNaN(v)) return "–";
  const a=Math.abs(v); let num,unit="";
  if(a>=1e7){num=(v/1e7).toFixed(2); unit="Cr";}
  else if(a>=1e5){num=(v/1e5).toFixed(2); unit="L";}
  else num=Math.round(v).toLocaleString("en-IN");
  return `<span class="cur">₹</span>${num}${unit?`<span class="u">${unit}</span>`:""}`;
}
const fmtSign = v => v==null||isNaN(v) ? "–" : (v>=0?"+":"")+fmtCr(v);
const fmtPct = (v,d=1) => v==null||isNaN(v) ? "–" : (v>=0?"+":"")+v.toFixed(d)+"%";
const fmtPctRaw = (v,d=1) => v==null||isNaN(v) ? "–" : v.toFixed(d)+"%";
const fmtNum = (v,d=2) => v==null||isNaN(v) ? "–" : v.toFixed(d);
const fmtX = (v) => v==null||isNaN(v) ? "–" : v.toFixed(2)+"×";
const cls = v => v==null||isNaN(v) ? "" : (v>=0?"up":"down");
const cvar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

/* ── horizon slicing of a time series ── */
function sliceTS(dates, values, years){
  if(years==null) return {d:dates, v:values};
  const last = new Date(dates[dates.length-1]);
  const cut = new Date(last); cut.setFullYear(cut.getFullYear()-years);
  const d=[], v=[];
  for(let i=0;i<dates.length;i++){ if(new Date(dates[i])>=cut){ d.push(dates[i]); v.push(values[i]); } }
  return d.length?{d,v}:{d:dates.slice(-2),v:values.slice(-2)};
}

/* ════════════════ SVG chart kit ════════════════ */
const NS="http://www.w3.org/2000/svg";
const E=(n,a)=>{const e=document.createElementNS(NS,n); for(const k in a) e.setAttribute(k,a[k]); return e;};
const ts=d=>new Date(d).getTime();

/* multi-series time line/area with optional hover crosshair */
function lineChart(host, series, opts={}){
  // series: [{name,color,d:[],v:[],width,dash,fill,hideTip}]
  const W=760, H=opts.h||300, P={l:opts.padL??48,r:14,t:14,b:24};
  const svg=E("svg",{class:"chart",viewBox:`0 0 ${W} ${H}`,preserveAspectRatio:"none"});
  const allv=[].concat(...series.map(s=>s.v));
  let ymin=opts.ymin!=null?opts.ymin:Math.min(...allv);
  let ymax=opts.ymax!=null?opts.ymax:Math.max(...allv);
  if(ymin===ymax) ymax=ymin+1;
  const allt=[].concat(...series.map(s=>s.d.map(ts)));
  const xmin=Math.min(...allt), xmax=Math.max(...allt);
  const X=t=>P.l+(t-xmin)/(xmax-xmin||1)*(W-P.l-P.r);
  const Y=v=>P.t+(1-(v-ymin)/(ymax-ymin))*(H-P.t-P.b);
  const yfmt=opts.yfmt||(v=>v);
  // gridlines + y labels
  const g=E("g",{class:"axis"}); const ticks=opts.yticks||4;
  for(let i=0;i<=ticks;i++){
    const val=ymin+(ymax-ymin)*i/ticks, y=Y(val);
    svg.appendChild(E("line",{class:(opts.zeroAt!=null&&Math.abs(val-opts.zeroAt)<1e-9)?"zeroline":"gridline",x1:P.l,y1:y,x2:W-P.r,y2:y}));
    const t=E("text",{x:P.l-8,y:y+3,"text-anchor":"end"}); t.textContent=yfmt(val); g.appendChild(t);
  }
  // x year/month ticks
  const span=(xmax-xmin)/3.156e10; // years
  const y0=new Date(xmin), y1=new Date(xmax);
  const labels=[];
  if(span<=2.2){ // months
    let d=new Date(y0.getFullYear(),y0.getMonth(),1);
    const step=span<=1.1?2:3;
    while(d<=y1){ labels.push([d.getTime(), (d.getMonth()===0?"'"+String(d.getFullYear()).slice(2):["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()])]); d=new Date(d.getFullYear(),d.getMonth()+step,1); }
  } else {
    const stepY=Math.max(1,Math.ceil(span/8));
    for(let yr=y0.getFullYear(); yr<=y1.getFullYear(); yr+=stepY) labels.push([new Date(yr,0,1).getTime(),"'"+String(yr).slice(2)]);
  }
  labels.forEach(([t,lab])=>{const x=X(t); if(x<P.l-2||x>W+2)return; const tx=E("text",{x,y:H-6,"text-anchor":"middle"}); tx.textContent=lab; g.appendChild(tx);});
  svg.appendChild(g);
  // area fill (first fillable series)
  series.forEach(s=>{
    if(!s.fill) return;
    let d=`M ${X(ts(s.d[0]))} ${Y(s.v[0])}`;
    s.d.forEach((dd,i)=>d+=` L ${X(ts(dd))} ${Y(s.v[i])}`);
    const baseY = opts.zeroAt!=null?Y(opts.zeroAt):Y(ymin);
    d+=` L ${X(ts(s.d[s.d.length-1]))} ${baseY} L ${X(ts(s.d[0]))} ${baseY} Z`;
    const gid="fg"+Math.random().toString(36).slice(2,7);
    const grad=E("linearGradient",{id:gid,x1:0,y1:0,x2:0,y2:1});
    grad.appendChild(E("stop",{offset:"0%","stop-color":s.color,"stop-opacity":.22}));
    grad.appendChild(E("stop",{offset:"100%","stop-color":s.color,"stop-opacity":0}));
    svg.appendChild(grad);
    svg.appendChild(E("path",{d,fill:`url(#${gid})`,stroke:"none"}));
  });
  // lines
  series.forEach((s,si)=>{
    if(!s.d.length) return;
    let d=`M ${X(ts(s.d[0]))} ${Y(s.v[0])}`;
    s.d.forEach((dd,i)=>{ if(i) d+=` L ${X(ts(dd))} ${Y(s.v[i])}`; });
    const p=E("path",{d,fill:"none",stroke:s.color,"stroke-width":s.width||2,"stroke-linejoin":"round","stroke-linecap":"round"});
    if(s.dash) p.setAttribute("stroke-dasharray",s.dash);
    if(opts.draw && !s.dash){ p.classList.add("draw"); p.style.setProperty("--len",2400); p.style.animationDelay=(si*.1)+"s"; }
    svg.appendChild(p);
  });
  host.innerHTML=""; host.appendChild(svg);
  // hover
  if(opts.hover!==false){
    const tip=elh(`<div class="tip"></div>`); host.appendChild(tip);
    const cross=E("line",{class:"crosshair",x1:0,y1:P.t,x2:0,y2:H-P.b,opacity:0}); svg.appendChild(cross);
    const dots=series.map(s=>{const c=E("circle",{r:3.5,fill:s.color,stroke:cvar("--surface"),"stroke-width":1.5,opacity:0}); svg.appendChild(c); return c;});
    const base=series[0];
    const move=e=>{
      const pt=e.touches?e.touches[0]:e; const rect=svg.getBoundingClientRect();
      const px=(pt.clientX-rect.left)/rect.width*W;
      const t=xmin+(px-P.l)/(W-P.l-P.r)*(xmax-xmin);
      let bi=0,bd=1e18; base.d.forEach((dd,i)=>{const dist=Math.abs(ts(dd)-t); if(dist<bd){bd=dist;bi=i;}});
      const xx=X(ts(base.d[bi]));
      cross.setAttribute("x1",xx); cross.setAttribute("x2",xx); cross.setAttribute("opacity",1);
      let rows="";
      series.forEach((s,si)=>{
        const v=s.v[bi]; const ok=v!=null && !isNaN(v);
        dots[si].setAttribute("cx",xx); dots[si].setAttribute("cy",Y(ok?v:ymin)); dots[si].setAttribute("opacity",ok?1:0);
        if(!s.hideTip) rows+=`<div class="r"><span><i style="background:${s.color}"></i>${s.name}</span><b>${(opts.tipFmt||yfmt)(v)}</b></div>`;
      });
      tip.innerHTML=`<div class="d">${base.d[bi]}</div>${rows}`; tip.style.opacity=1;
      let tx=px/W*rect.width+14; if(tx>rect.width-160)tx-=174;
      tip.style.left=tx+"px"; tip.style.top="8px";
    };
    svg.addEventListener("mousemove",move); svg.addEventListener("touchmove",move,{passive:true});
    const hide=()=>{tip.style.opacity=0; cross.setAttribute("opacity",0); dots.forEach(d=>d.setAttribute("opacity",0));};
    svg.addEventListener("mouseleave",hide); svg.addEventListener("touchend",hide);
  }
  return svg;
}

/* bar chart: vertical/horizontal, optional grouped */
function barChart(host, {labels, datasets, horizontal=false, h=300, yfmt=v=>v, valFmt}){
  const W=760, H=h, P={l:horizontal?96:48,r:14,t:12,b:horizontal?20:46};
  const svg=E("svg",{class:"chart",viewBox:`0 0 ${W} ${H}`,preserveAspectRatio:"none"});
  const allv=[].concat(...datasets.map(d=>d.values.filter(v=>v!=null)));
  let vmin=Math.min(0,...allv), vmax=Math.max(0,...allv); if(vmin===vmax)vmax=vmin+1;
  const n=labels.length, ng=datasets.length;
  if(horizontal){
    const X=v=>P.l+(v-vmin)/(vmax-vmin)*(W-P.l-P.r);
    const band=(H-P.t-P.b)/n, bh=Math.min(20, band*0.62/ng);
    const g=E("g",{class:"axis"});
    [0,.25,.5,.75,1].forEach(f=>{const val=vmin+(vmax-vmin)*f, x=X(val);
      svg.appendChild(E("line",{class:val===0?"zeroline":"gridline",x1:x,y1:P.t,x2:x,y2:H-P.b}));
      const t=E("text",{x,y:H-6,"text-anchor":"middle"}); t.textContent=yfmt(val); g.appendChild(t);});
    labels.forEach((lab,i)=>{
      const yc=P.t+band*i+band/2;
      const t=E("text",{x:P.l-8,y:yc+3,"text-anchor":"end"}); t.textContent=lab; g.appendChild(t);
      datasets.forEach((ds,j)=>{
        const v=ds.values[i]; if(v==null)return;
        const x0=X(Math.min(0,v)), x1=X(Math.max(0,v));
        const col=typeof ds.color==="function"?ds.color(v,i):ds.color;
        svg.appendChild(E("rect",{x:x0,y:yc-bh*ng/2+bh*j,width:Math.max(1,x1-x0),height:bh*0.88,rx:2,fill:col}));
      });
    });
    svg.appendChild(g);
  } else {
    const Y=v=>P.t+(1-(v-vmin)/(vmax-vmin))*(H-P.t-P.b);
    const band=(W-P.l-P.r)/n, bw=Math.min(40, band*0.7/ng);
    const g=E("g",{class:"axis"});
    for(let i=0;i<=4;i++){const val=vmin+(vmax-vmin)*i/4, y=Y(val);
      svg.appendChild(E("line",{class:val===0?"zeroline":"gridline",x1:P.l,y1:y,x2:W-P.r,y2:y}));
      const t=E("text",{x:P.l-8,y:y+3,"text-anchor":"end"}); t.textContent=yfmt(val); g.appendChild(t);}
    labels.forEach((lab,i)=>{
      const xc=P.l+band*i+band/2;
      if(n<=16 || i%Math.ceil(n/16)===0){const t=E("text",{x:xc,y:H-6,"text-anchor":"middle"}); t.textContent=lab; g.appendChild(t);}
      datasets.forEach((ds,j)=>{
        const v=ds.values[i]; if(v==null)return;
        const y0=Y(Math.max(0,v)), y1=Y(Math.min(0,v));
        const col=typeof ds.color==="function"?ds.color(v,i):ds.color;
        svg.appendChild(E("rect",{x:xc-bw*ng/2+bw*j,y:y0,width:bw*0.86,height:Math.max(1,y1-y0),rx:2,fill:col}));
      });
    });
    svg.appendChild(g);
  }
  host.innerHTML=""; host.appendChild(svg);
  return svg;
}

/* donut */
function donut(host, {labels, values, colors}){
  const total=values.reduce((a,b)=>a+b,0); const W=260,H=260,cx=130,cy=130,r=104,ir=64;
  const svg=E("svg",{class:"chart",viewBox:`0 0 ${W} ${H}`,style:"max-width:260px;margin:0 auto"});
  let a0=-Math.PI/2;
  values.forEach((v,i)=>{
    const a1=a0+(v/total)*2*Math.PI;
    const large=(a1-a0)>Math.PI?1:0;
    const p=[cx+r*Math.cos(a0),cy+r*Math.sin(a0),cx+r*Math.cos(a1),cy+r*Math.sin(a1),
             cx+ir*Math.cos(a1),cy+ir*Math.sin(a1),cx+ir*Math.cos(a0),cy+ir*Math.sin(a0)];
    const d=`M ${p[0]} ${p[1]} A ${r} ${r} 0 ${large} 1 ${p[2]} ${p[3]} L ${p[4]} ${p[5]} A ${ir} ${ir} 0 ${large} 0 ${p[6]} ${p[7]} Z`;
    const path=E("path",{d,fill:colors[i%colors.length],stroke:cvar("--surface"),"stroke-width":2});
    const tt=E("title"); tt.textContent=`${labels[i]}: ${fmtCr(v)} (${(v/total*100).toFixed(1)}%)`; path.appendChild(tt);
    svg.appendChild(path); a0=a1;
  });
  host.innerHTML=""; host.appendChild(svg);
}

const SERIES_COL = {
  "Your Strategy (Timed HODL)":"--accent", "Timed HODL":"--accent",
  "SIP on Your Stocks":"--sip", "SIP":"--sip",
  "Timed Entry+Exit":"--bench", "SIP on NIFTY 50":"--bench", "NIFTY 50":"--bench",
};
function seriesColor(name){ return cvar(SERIES_COL[name]||"--ink-dim"); }
const ALLOC_COLORS = ["--accent","--sip","--up","--bench","--down"].map(cvar)
  .concat(["oklch(0.72 0.10 320)","oklch(0.78 0.11 140)","oklch(0.74 0.09 30)","oklch(0.70 0.08 280)","oklch(0.76 0.10 190)","oklch(0.66 0.04 250)"]);

/* tile builder */
function tile(k, v, sub, vc, lead){ return `<div class="tile${lead?' lead':''}"><div class="k">${k}</div><div class="v ${vc||''}">${v}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`; }
function sechead(title, lede, asof){ return `<div class="sec-head"><div><h1>${title}</h1>${lede?`<p class="lede">${lede}</p>`:""}</div>${asof?`<div class="asof">${asof}</div>`:""}</div>`; }

        <div class="chart-host" id="pf_alloc"></div><div id="pf_alloc_leg" class="legend" style="justify-content:center"></div></div>
      <div class="card"><h3>P&amp;L by stock</h3><div class="csub">Realised + unrealised, live prices</div>
        <div class="chart-host" id="pf_pnl"></div></div>
    </div>
    <div class="controls"><input id="pf_q" placeholder="Filter stocks…" oninput="pfFilter()"></div>
    <div class="table-wrap"><table id="pf_tbl"><thead><tr>
      ${["stock|Stock","avg_price|Avg","cmp|CMP","shares|Shares","invested|Invested","value|Value","pnl|P&amp;L","ret|Return","weight|Weight"].map(c=>{const[k,l]=c.split("|");return `<th data-col="${k}" onclick="pfSort('${k}')">${l}</th>`}).join("")}

  const top=pf.pnl.labels.map((s,i)=>[s,pf.pnl.values[i]]).slice(-22);
  barChart($("#pf_pnl"),{labels:top.map(t=>t[0]),datasets:[{values:top.map(t=>t[1]),color:v=>v>=0?cvar("--up"):cvar("--down")}],horizontal:true,h:360,yfmt:v=>fmtCr(v)});

}
function pfRender(){
  const allrows=PH().rows;
  const q=($("#pf_q")?.value||"").toLowerCase();
  let rows=allrows.filter(r=>r.stock.toLowerCase().includes(q));
  const {col,dir}=PF_SORT;
  rows.sort((a,b)=> col==="stock" ? -dir*a.stock.localeCompare(b.stock) : dir*(a[col]-b[col]));
  const maxw=allrows.length?Math.max(...allrows.map(r=>r.weight)):1;
  let ti=0,tv=0,html="";
  rows.forEach(r=>{ ti+=r.invested; tv+=r.value;
    html+=`<tr>
      <td><span class="stocklink" onclick="stockModal('${r.stock}')">${r.stock}</span></td>
      <td>₹${r.avg_price.toFixed(2)}</td><td>₹${r.cmp.toFixed(2)}</td><td>${r.shares.toFixed(1)}</td>
      <td>${fmtCr(r.invested)}</td><td>${fmtCr(r.value)}</td>
      <td class="${cls(r.pnl)}">${fmtSign(r.pnl)}</td><td class="${cls(r.ret)}">${fmtPct(r.ret)}</td>
      <td><span class="wbar">${r.weight.toFixed(1)}%<i style="width:${(r.weight/maxw*46).toFixed(0)}px;background:${r.pnl>=0?'var(--up)':'var(--down)'}"></i></span></td></tr>`; });
  const tp=tv-ti;
  html+=`<tr class="total"><td>TOTAL (${rows.length})</td><td></td><td></td><td></td><td>${fmtCr(ti)}</td><td>${fmtCr(tv)}</td><td class="${cls(tp)}">${fmtSign(tp)}</td><td class="${cls(tp)}">${fmtPct(tp/ti*100)}</td><td>100%</td></tr>`;
  $("#pf_body").innerHTML=html;
  document.querySelectorAll("#pf_tbl th").forEach(th=>th.classList.toggle("sorted",th.dataset.col===col));
}
function pfSort(c){ PF_SORT = {col:c, dir: PF_SORT.col===c?-PF_SORT.dir:(c==="stock"?-1:-1)}; pfRender(); }
function pfFilter(){ pfRender(); }
function stockModal(stock){
  const r=PH().rows.find(d=>d.stock===stock); if(!r)return;
  $("#mTitle").textContent=r.stock;
  $("#mSub").innerHTML=`${r.num_buys} buys · ${r.first_buy} → ${r.last_buy} · avg ₹${r.avg_price.toFixed(2)} · CMP ₹${r.cmp.toFixed(2)} · <span class="${cls(r.pnl)}">${fmtSign(r.pnl)} (${fmtPct(r.ret)})</span>`;
  $("#mBody").innerHTML=`<div class="table-wrap" style="border:none"><table><thead><tr><th>Date</th><th>Price</th><th>Shares</th><th>Amount</th></tr></thead><tbody>${r.trades.map(t=>`<tr><td>${t.date}</td><td>₹${t.price.toFixed(2)}</td><td>${t.shares.toFixed(1)}</td><td>${fmtCr(t.amount)}</td></tr>`).join("")}</tbody></table></div>`;
  $("#overlay").classList.add("active");
}
function closeModal(){ $("#overlay").classList.remove("active"); }
$("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

/* ════════════════ horizon helpers (regime / buy windows) ════════════════ */
// REGIME end dates, in backtest.py REGIMES order (matches b.regimes order).
const REGIME_END = ["2003-05-01","2008-01-01","2009-03-31","2015-03-01","2020-01-01","2020-06-01","2022-01-01","2023-01-01","2026-12-31"];
function horizonCutoff(refDate){
  const yrs=HZ_YEARS[HZ]; if(yrs==null) return null;
  const c=new Date(refDate); c.setFullYear(c.getFullYear()-yrs); return c;
}
function buyDistForHorizon(n=22){
  // PH().rows is already a fresh windowed book, so buy counts are window-scoped.
  const counts={};
  PH().rows.forEach(r=>{ counts[r.stock]=(counts[r.stock]||0)+(r.num_buys||(r.trades?r.trades.length:0)); });
  return Object.entries(counts).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

/* ════════════════ BACKTEST ════════════════ */

  // rolling alpha (windowed)
  const alNames=Object.keys(b.rolling_alpha||{});
  const alSeries=alNames.map((k,i)=>{const s=sliceTS(b.rolling_alpha[k].dates,b.rolling_alpha[k].values,HZ_YEARS[HZ]);

  } else $("#bt_reg").innerHTML=`<p class="csub" style="padding:30px 0;text-align:center">No full market regime in this window.</p>`;

  else $("#bt_buy").innerHTML=`<p class="csub" style="padding:30px 0;text-align:center">No buys in this window.</p>`;
}
function renderBtCmp(c){
  const strd=["Timed HODL","SIP","NIFTY 50"], short={"Timed HODL":"Timed","SIP":"SIP","NIFTY 50":"NIFTY"};
  const rows=[["XIRR",x=>x.xirr,"pct","max"],["Multiple",x=>x.mult,"x","max"],["Sharpe",x=>x.sharpe,"n","max"],
    ["Sortino",x=>x.sortino,"n","max"],["Max DD",x=>x.maxdd,"pct","max"],["Volatility",x=>x.vol,"pct","min"]];
  const ff={pct:v=>v==null?"–":v.toFixed(1)+"%",x:v=>v==null?"–":v.toFixed(2)+"×",n:v=>v==null?"–":v.toFixed(2)};
  let h=`<table><thead><tr><th></th>${strd.map(s=>`<th>${short[s]}</th>`).join("")}</tr></thead><tbody>`;
  rows.forEach(([lab,fn,fmt,best])=>{
    const vals=strd.map(s=>c[s+"|"+HZ]?fn(c[s+"|"+HZ]):null);
    const nums=vals.filter(v=>v!=null);
    const bv=nums.length>1?(best==="max"?Math.max(...nums):Math.min(...nums)):null;
    h+=`<tr><td>${lab}</td>${vals.map(v=>`<td class="${v===bv&&v!=null?'cell-best':''}">${ff[fmt](v)}</td>`).join("")}</tr>`;
  });
  h+=`</tbody></table>`; $("#bt_cmp").innerHTML=h;
}

function scrSetSort(k){ SCR_SORT=k; document.querySelectorAll("#scrSort button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.k===k)); renderScrBoard(); }
function scrPick(k){ SCR_LIST=k; document.querySelectorAll("#scr_chips .chip").forEach(b=>b.setAttribute("aria-pressed",b.dataset.k===k)); renderScrInspect(); }
function renderScrBoard(){
  const hk=SIX_MAP[HZ]; const rows=(SIX.comparison[hk]||[]).slice();
  const sv=r=>SCR_SORT==="final"?(r.timed.final||0):SCR_SORT==="xirr"?(r.timed.xirr??-999):SCR_SORT==="sharpe"?(r.timed.sharpe??-999):(r.timed.maxdd??-999);
  rows.sort((a,b)=>sv(b)-sv(a));
  const live=rows.filter(r=>!r.benchmark); const bestF=Math.max(...live.map(r=>r.timed.final||0));
  $("#scr_body").innerHTML=rows.map(r=>{
    const best=(r.timed.final||0)===bestF&&!r.benchmark;
    let tags=""; if(best)tags=`<span class="tag crown">★ best</span>`; else if(r.key==="stocks_current")tags=`<span class="tag live">live</span>`; else if(r.key==="univest_old")tags=`<span class="tag">legacy</span>`; else if(r.benchmark)tags=`<span class="tag">index</span>`;
    return `<tr class="${best?'best':r.key==='stocks_current'?'cur':''}">
      <td>${r.label} ${tags}</td><td>${r.n??"–"}</td><td style="color:var(--ink-dim)">${fmtCr(r.invested)}</td>
      <td>${fmtCr(r.timed.final)}</td><td>${fmtX(r.timed.final/r.invested)}</td>
      <td class="${cls(r.timed.ret)}">${fmtPct(r.timed.ret)}</td><td class="${cls(r.timed.xirr)}">${fmtPct(r.timed.xirr)}</td>
      <td>${fmtNum(r.timed.sharpe)}</td><td class="down">${fmtPctRaw(r.timed.maxdd)}</td>
      <td style="color:var(--bench)">${fmtCr(r.sip.final)}</td></tr>`;
  }).join("");
}

/* ════════════════ ITERATIONS ════════════════ */
function renderIterations(){
  const el=$("#panel-iterations"); const it=S.iterations||[];
  if(it.length<2){ el.innerHTML=sechead("Iterations","Only one run on file: iterations appear once a second backtest run exists."); return; }
  const grid=S.horizons_grid; const gh=GRID_MAP[HZ]; const dv=(grid&&grid.default_variant)||"bb60";
  el.innerHTML = sechead("Iterations",
    `How each watchlist version would have performed, scoped to ${HZ==="All"?"full history":HZ} (bb-60 signals, salary model).`,
    `${grid?grid.contribution:""}<br>to <b>${grid?grid.end_date:S.end_date}</b>`) + `
    <div class="table-wrap" style="margin-bottom:20px"><table><thead><tr><th></th>${it.map(i=>`<th${i.is_current?' class="sorted"':''}>${i.label}</th>`).join("")}</tr></thead><tbody id="it_body"></tbody></table></div>
    <div class="card"><h3>Timed HODL equity across iterations</h3><div class="csub">${HZ==="All"?"Full history":HZ}, anchored to the current run's dates</div>
      <div class="legend" id="it_leg"></div><div class="chart-host" id="it_eq"></div></div>`;
  // table: full-period rows from iterations + horizon rows from grid
  const wlKeyFor=i=> i.is_current?"Current":(grid.watchlists.find(w=>!w.is_current&&w.label!=="Current")||{}).key;
  const gridCell=(i,metric)=>{ // map iteration -> grid watchlist by is_current / order
    const wls=grid.watchlists; let wkey;
    if(i.is_current) wkey=(wls.find(w=>w.is_current)||{}).key;
    else { const idx=it.indexOf(i); wkey=(wls.filter(w=>!w.is_current)[idx-1]||{}).key; }
    const cell=grid.cells[`${wkey}|${dv}|${gh}`]; return cell?cell[metric]:null;
  };
  const rows=[
    ["Watchlist size", i=>i.watchlist, "max", v=>v??"–"],
    ["Stocks with data", i=>i.n_stocks, null, v=>v??"–"],
    [`XIRR · ${HZ}`, i=>gridCell(i,"xirr"), "max", v=>v==null?"–":v.toFixed(1)+"%"],
    [`Multiple · ${HZ}`, i=>gridCell(i,"mult"), "max", v=>v==null?"–":v.toFixed(2)+"×"],
    [`Max DD · ${HZ}`, i=>gridCell(i,"maxdd"), "max", v=>v==null?"–":v.toFixed(1)+"%"],
    ["Final (full)", i=>i.final_value, "max", v=>v==null?"–":fmtCr(v)],
    ["Sharpe (full)", i=>i.sharpe, "max", v=>v==null?"–":v.toFixed(2)],
    ["Sortino (full)", i=>i.sortino, "max", v=>v==null?"–":v.toFixed(2)],
    ["Cash drag (full)", i=>i.cash_pct, "min", v=>v==null?"–":v.toFixed(1)+"%"],
  ];
  let h="";
  rows.forEach(([lab,fn,best,ff])=>{
    const vals=it.map(fn); const nums=vals.filter(v=>v!=null&&!isNaN(v));
    const bv=best&&nums.length>1?(best==="max"?Math.max(...nums):Math.min(...nums)):null;
    h+=`<tr><td>${lab}</td>${vals.map(v=>`<td class="${v===bv&&v!=null?'cell-best':''}">${ff(v)}</td>`).join("")}</tr>`;
  });
  $("#it_body").innerHTML=h;
  // overlay equity
  const baseFull=(it[0].equity&&it[0].equity.dates)||[];
  const base=sliceTS(baseFull, baseFull.map((_,i)=>i), HZ_YEARS[HZ]).d;   // window the anchor dates
  const pal=[cvar("--accent"),cvar("--sip"),cvar("--up"),cvar("--down"),cvar("--bench")];
  const series=it.map((i,idx)=>{const map={}; (i.equity.dates||[]).forEach((d,j)=>map[d]=i.equity.values[j]);
    return {name:i.label,color:pal[idx%pal.length],d:base,v:base.map(d=>d in map?map[d]:null),width:i.is_current?2.4:1.5,dash:i.is_current?null:"5 4"};});
  $("#it_leg").innerHTML=series.map(s=>`<span><i style="background:${s.color}" class="${s.dash?'dash':''}"></i>${s.name}</span>`).join("");
  lineChart($("#it_eq"),series,{h:300,ymin:0,yfmt:v=>fmtCr(v),tipFmt:v=>fmtCr(v),draw:true,padL:54});
}
